services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcription_portal_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./models:/app/models
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - WHISPER_DOWNLOAD_ROOT=/app/models/whisper
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transcription_portal_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PROXY_TARGET=http://backend:8000
    command: npm run dev
